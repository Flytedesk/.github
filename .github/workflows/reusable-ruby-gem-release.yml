name: reusable-ruby-gem-release

# One-shot release: bumps version.rb + Gemfile.lock, commits to the target
# branch, tags v<version>, and creates a GitHub Release. The gem's own
# publish workflow (triggered by `release: published`) then pushes to
# RubyGems.
#
# RELEASE_TOKEN is a fine-grained PAT owned by a repo admin, used so the
# push and release creation bypass the main-branch ruleset via admin
# bypass, and so the resulting `release: published` event can trigger
# the publish workflow (events from GITHUB_TOKEN do not cascade).

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
        description: "New semver version, e.g. 1.2.3 or 1.2.3-beta.1"
      gem_name:
        required: true
        type: string
        description: "Gem name; used to locate lib/<gem_name>/version.rb"
      target_branch:
        required: false
        type: string
        default: main
      run_tests:
        required: false
        type: boolean
        default: true
        description: "Run `bundle exec rspec` as a gate before releasing"
    secrets:
      RELEASE_TOKEN:
        required: true
        description: "Fine-grained PAT with contents:write and a repo-admin identity (for ruleset bypass)"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Validate version
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if ! printf '%s' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.\-]+)?$'; then
            echo "::error::Version must be semver (e.g. 1.2.3 or 1.2.3-beta.1). Got: $VERSION"
            exit 1
          fi

      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.target_branch }}
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version-file: '.ruby-version'
          bundler-cache: true

      - name: Ensure tag does not already exist
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if git rev-parse -q --verify "refs/tags/v$VERSION" >/dev/null; then
            echo "::error::Tag v$VERSION already exists"
            exit 1
          fi

      - name: Run tests
        if: ${{ inputs.run_tests }}
        run: bundle exec rspec

      - name: Bump version file
        env:
          VERSION: ${{ inputs.version }}
          GEM_NAME: ${{ inputs.gem_name }}
        run: |
          file="lib/${GEM_NAME}/version.rb"
          if [ ! -f "$file" ]; then
            echo "::error::Version file not found at $file"
            exit 1
          fi
          ruby -i -pe 'sub(/VERSION\s*=\s*"[^"]+"/, %Q(VERSION = "#{ENV["VERSION"]}"))' "$file"
          if git diff --quiet -- "$file"; then
            echo "::error::Version file unchanged; is the repo already at $VERSION?"
            exit 1
          fi
          echo "--- new version file ---"
          cat "$file"

      - name: Update Gemfile.lock
        # ruby/setup-ruby sets deployment=true when bundler-cache is on,
        # which makes `bundle install` refuse to rewrite Gemfile.lock.
        # We just bumped the gem's own version, so the lockfile MUST
        # change. Clear the flags, then install.
        run: |
          bundle config unset deployment
          bundle config unset frozen
          bundle install

      - name: Commit, tag, and push
        env:
          VERSION: ${{ inputs.version }}
          GEM_NAME: ${{ inputs.gem_name }}
          TARGET_BRANCH: ${{ inputs.target_branch }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "lib/${GEM_NAME}/version.rb" Gemfile.lock
          git commit -m "chore(release): v${VERSION}"
          git tag -a "v${VERSION}" -m "Release v${VERSION}"
          git push origin "HEAD:${TARGET_BRANCH}"
          git push origin "v${VERSION}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          VERSION: ${{ inputs.version }}
        run: |
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --target "${{ inputs.target_branch }}" \
            --generate-notes
