name: reusable-ruby-gem-publish
on:
  workflow_call:
    inputs:
      gem_name:
        required: true
        type: string
      ruby_version:
        required: false
        type: string
        default: "3.4"
    secrets:
      RUBYGEMS_API_KEY:
        required: true
permissions:
  contents: read
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ inputs.ruby_version }}
          bundler-cache: true
      - name: Build gem
        run: gem build ${{ inputs.gem_name }}.gemspec
      - name: Push to RubyGems
        env:
          GEM_HOST_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
        run: gem push *.gem
